- name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: apps/finance-dashboard
        run: pnpm install

      - name: Build
        working-directory: apps/finance-dashboard
        run: pnpm run build
